spring.application.name=smart-campus-backend
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=YOUR_MONGODB_ATLAS_URI

# JWT Configuration (Use a strong 256-bit secret in production)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# Google OAuth2 Configuration
# Important: Replace these with your actual credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

# App Redirect Configuration
app.oauth2.redirect-uri=http://localhost:5173/login/success

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB