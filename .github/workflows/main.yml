# ──────────────────────────────────────────────────────────────────────────────
# Smart Campus Operations Hub – Member 4 CI/CD Pipeline
#
# Triggers: every push or pull-request targeting the 'main' branch.
#
# Jobs:
#   1. build-and-test  – Compile, run tests, and package the Spring Boot JAR
#   2. docker-build    – (Optional) Build and push a Docker image to GHCR
#
# Secrets required (set in GitHub → Settings → Secrets → Actions):
#   GOOGLE_CLIENT_ID     – OAuth2 client id for test context
#   GOOGLE_CLIENT_SECRET – OAuth2 client secret for test context
# ──────────────────────────────────────────────────────────────────────────────

name: CI – Build & Test (Member 4)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel any in-progress run for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 – Build, Test, Package
  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Spring Boot)
    runs-on: ubuntu-latest

    # Start MongoDB as a service container for integration tests
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (Temurin / Eclipse Adoptium)
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      # 3. Cache Maven local repository to speed up subsequent runs
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Run mvn clean install (compile + test + package)
      - name: Build and run tests
        working-directory: backend
        env:
          # Inject test-safe values; these are not real credentials
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/smartcampus_ci
          APP_JWT_SECRET: CITestSecretKeyForSmartCampusHub_AtLeast256Bits_2026!
          APP_JWT_EXPIRATION_MS: 3600000
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: mvn clean install --batch-mode --no-transfer-progress

      # 5. Publish test results as a GitHub check
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/target/surefire-reports/*.xml

      # 6. Upload the compiled JAR as a workflow artifact (available for 7 days)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-backend-jar
          path: backend/target/*.jar
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 – (Optional) Docker Build & Push to GitHub Container Registry
  # Runs only on pushes to main (not on pull requests) to avoid publishing
  # unreviewed images.
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR from previous job
        uses: actions/download-artifact@v4
        with:
          name: smart-campus-backend-jar
          path: backend/target/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/smart-campus-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
